claim_source_rules:
  experimental:
    placeholder_unknown_allowed: true
    production_claim_allowed: false
  development:
    allowed_sources:
      - measured
      - calibrated_from_target_baseline
      - inferred_from_operating_envelope
      - user_mandated
      - standard_or_platform_guidance
      - placeholder_unknown
    production_claim_allowed: false
  target_validated:
    required_sources:
      - measured
      - calibrated_from_target_baseline
      - inferred_from_operating_envelope
  production_ready:
    required_sources:
      - measured
      - calibrated_from_target_baseline
    requires_operating_envelope_evidence: true

rules:
  no_production_budget_without_provenance: true
  no_measurement_no_claim: true
  host_fallback_is_not_target_proof: true
  placeholder_unknown_blocks_production_claims: true
  stale_or_triggered_revisit_blocks_production_claims: true
