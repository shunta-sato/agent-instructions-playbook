pattern:
  id: "trust-corporate"
  label: "Trust Corporate"
  summary: "Communicate steadily. Do not compromise trust."
  suitable_for: ["product-ui", "docs", "marketing-site"]
  tokens:
    dtcg_json: "tonemana/catalog/tokens/trust-corporate.tokens.json"
    css_vars: "tonemana/catalog/tokens/trust-corporate.tokens.css"
  visual_rules:
    spacing_unit_px: 8
    radius_px: 6
    elevation: "low"
    imagery: "structured"
  writing_style:
    politeness: "polite"
    sentence: "short"
    punctuation:
      exclamation: "avoid"
      emoji: "avoid"
    do_dont:
      do: "Please review the content and approve."
      dont: "This is OK! Approve right away!"
  preview:
    html: "tonemana/catalog/previews/index.html?pattern=trust-corporate"
