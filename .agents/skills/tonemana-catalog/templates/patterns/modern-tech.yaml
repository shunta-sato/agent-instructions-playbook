pattern:
  id: "modern-tech"
  label: "Modern Tech"
  summary: "Deliver information quickly with sharp edges."
  suitable_for: ["product-ui", "docs", "marketing-site"]
  tokens:
    dtcg_json: "tonemana/catalog/tokens/modern-tech.tokens.json"
    css_vars: "tonemana/catalog/tokens/modern-tech.tokens.css"
  visual_rules:
    spacing_unit_px: 8
    radius_px: 6
    elevation: "medium"
    imagery: "geometric"
  writing_style:
    politeness: "neutral"
    sentence: "short"
    punctuation:
      exclamation: "avoid"
      emoji: "avoid"
    do_dont:
      do: "Processing failed. Check logs and run again."
      dont: "Processing error! Try again!"
  preview:
    html: "tonemana/catalog/previews/index.html?pattern=modern-tech"
