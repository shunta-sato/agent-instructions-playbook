pattern:
  id: "premium-elegant"
  label: "Premium Elegant"
  summary: "Refined through whitespace. Quiet and premium."
  suitable_for: ["marketing-site", "product-ui", "docs"]
  tokens:
    dtcg_json: "tonemana/catalog/tokens/premium-elegant.tokens.json"
    css_vars: "tonemana/catalog/tokens/premium-elegant.tokens.css"
  visual_rules:
    spacing_unit_px: 10
    radius_px: 10
    elevation: "low"
    imagery: "editorial"
  writing_style:
    politeness: "polite"
    sentence: "medium"
    punctuation:
      exclamation: "avoid"
      emoji: "avoid"
    do_dont:
      do: "We apologize for the inconvenience. Please wait while service is restored."
      dont: "Service incident in progress. Please wait."
  preview:
    html: "tonemana/catalog/previews/index.html?pattern=premium-elegant"
