{
  "schema_version": 1,
  "task_classes": {
    "unit_test_single_case": {
      "description": "One focused unit test or assertion group.",
      "profile": "focused_code_edit",
      "prompt_detail": "strict",
      "risk_gate": "low",
      "default_effort": "medium",
      "max_scope": {
        "writable_files": 1,
        "production_code": false
      },
      "escalation_profile": "coding_supervisor",
      "success_criteria": {
        "required": [
          "agent_exit_success",
          "changed_files_within_allowed_scope",
          "validation_command_passed",
          "exactly_one_focused_test_added"
        ]
      }
    },
    "focused_code_change": {
      "description": "Small implementation change with known files and a bounded verification command.",
      "profile": "focused_code_edit",
      "prompt_detail": "normal",
      "risk_gate": "normal",
      "default_effort": "medium",
      "max_scope": {
        "writable_files": 3,
        "production_code": true
      },
      "escalation_profile": "coding_supervisor",
      "success_criteria": {
        "required": [
          "changed_files_within_allowed_scope",
          "validation_command_passed",
          "quality_gate_ready"
        ]
      }
    },
    "ci_failure_diagnosis": {
      "description": "Diagnose failing tests, build, shell, Docker, or CI behavior.",
      "profile": "terminal_debug_supervisor",
      "prompt_detail": "compact",
      "risk_gate": "normal",
      "default_effort": "high",
      "escalation_profile": "frontier_execution_supervisor",
      "success_criteria": {
        "required": [
          "failing_command_recorded",
          "evidence_log_excerpt_recorded",
          "root_cause_hypothesis_recorded"
        ]
      }
    },
    "architecture_review": {
      "description": "Review design, boundaries, compatibility, and long-term maintainability.",
      "profile": "high_reasoning_review",
      "prompt_detail": "compact",
      "risk_gate": "high",
      "default_effort": "high",
      "success_criteria": {
        "required": [
          "risks_identified",
          "recommendation_recorded",
          "unsupported_claims_marked"
        ]
      }
    },
    "codebase_exploration": {
      "description": "Map files, ownership, existing patterns, and likely change surfaces before implementation.",
      "profile": "codebase_explorer",
      "prompt_detail": "compact",
      "risk_gate": "normal",
      "default_effort": "low",
      "escalation_profile": "coding_supervisor",
      "success_criteria": {
        "required": [
          "relevant_paths_recorded",
          "existing_patterns_recorded",
          "unknowns_or_risks_recorded"
        ]
      }
    },
    "ros2_command_lookup": {
      "description": "Choose exact ROS 2 CLI command syntax, option placement, and caveats without executing the command.",
      "profile": "ros2_cli_command_reference",
      "prompt_detail": "strict",
      "risk_gate": "low",
      "default_effort": "medium",
      "max_scope": {
        "may_execute_commands": false,
        "allowed_artifacts": [
          "command recommendation",
          "source/help caveat"
        ]
      },
      "escalation_profile": "ros2_cli_operation_supervisor",
      "success_criteria": {
        "required": [
          "concrete_ros_names_preserved",
          "exact_command_form_returned",
          "source_or_installed_help_boundary_recorded",
          "no_target_execution_performed"
        ]
      }
    },
    "ros2_readonly_diagnosis": {
      "description": "Plan or perform read-only ROS 2 CLI graph/log/bag inspection with bounded commands and captured evidence.",
      "profile": "ros2_cli_observation_planner",
      "prompt_detail": "normal",
      "risk_gate": "normal",
      "default_effort": "high",
      "escalation_profile": "ros2_cli_operation_supervisor",
      "success_criteria": {
        "required": [
          "risk_class_recorded",
          "bounded_commands_only",
          "stdout_stderr_artifacts_named",
          "claim_boundaries_recorded"
        ]
      }
    },
    "ros2_mutating_operation_plan": {
      "description": "Prepare a ROS 2 CLI command plan for mutating, robot-affecting, filesystem/security, or source-sensitive operations.",
      "profile": "ros2_cli_operation_supervisor",
      "prompt_detail": "strict",
      "risk_gate": "high",
      "default_effort": "high",
      "escalation_profile": "frontier_execution_supervisor",
      "success_criteria": {
        "required": [
          "command_plan_required",
          "approval_boundary_recorded",
          "validation_command_required",
          "no_execution_without_explicit_user_approval"
        ]
      }
    }
  }
}
