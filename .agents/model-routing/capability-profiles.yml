{
  "schema_version": 1,
  "capability_profiles": {
    "focused_code_edit": {
      "description": "Bounded code or test edits with explicit allowed files and validation commands.",
      "requires": [
        "code_editing",
        "test_awareness",
        "scope_control"
      ],
      "fallback_profiles": [
        "coding_supervisor"
      ]
    },
    "coding_supervisor": {
      "description": "Implementation supervision for moderate ambiguity, local design judgment, and review of worker output.",
      "requires": [
        "code_review",
        "local_design_judgment",
        "verification_planning"
      ],
      "fallback_profiles": [
        "frontier_execution_supervisor"
      ]
    },
    "terminal_debug_supervisor": {
      "description": "Command-output diagnosis, failure evidence extraction, and root-cause hypothesis work.",
      "requires": [
        "terminal_reasoning",
        "log_analysis",
        "failure_hypothesis"
      ],
      "fallback_profiles": [
        "frontier_execution_supervisor"
      ]
    },
    "high_reasoning_review": {
      "description": "Architecture, boundary, compatibility, and long-horizon design review.",
      "requires": [
        "high_reasoning",
        "tradeoff_analysis",
        "claim_boundary_review"
      ],
      "fallback_profiles": [
        "frontier_execution_supervisor"
      ]
    },
    "codebase_explorer": {
      "description": "Repository orientation, search, pattern discovery, and scoped context packaging.",
      "requires": [
        "code_search",
        "pattern_recognition",
        "concise_context_packaging"
      ],
      "fallback_profiles": [
        "coding_supervisor"
      ]
    },
    "ros2_cli_command_reference": {
      "description": "Exact ROS 2 CLI command lookup, option placement, and source/help caveat handling without target execution.",
      "requires": [
        "ros2_cli_reference_use",
        "exact_command_syntax",
        "concrete_name_preservation",
        "no_execution_boundary"
      ],
      "fallback_profiles": [
        "ros2_cli_operation_supervisor"
      ]
    },
    "ros2_cli_observation_planner": {
      "description": "Read-only ROS 2 CLI diagnosis and bounded observation planning with stdout/stderr artifact discipline.",
      "requires": [
        "ros2_cli_readonly_diagnosis",
        "bounded_observation_planning",
        "artifact_capture",
        "claim_boundary_review"
      ],
      "fallback_profiles": [
        "ros2_cli_operation_supervisor"
      ]
    },
    "ros2_cli_operation_supervisor": {
      "description": "Supervision for mutating, robot-affecting, filesystem/security, or source-sensitive ROS 2 CLI operation plans.",
      "requires": [
        "ros2_cli_risk_gate",
        "approval_boundary",
        "validation_planning",
        "source_provenance_review"
      ],
      "fallback_profiles": [
        "frontier_execution_supervisor"
      ]
    },
    "frontier_execution_supervisor": {
      "description": "Highest-capability fallback for ambiguous, high-risk, or cross-boundary execution supervision.",
      "requires": [
        "frontier_reasoning",
        "broad_context_synthesis",
        "risk_management"
      ],
      "fallback_profiles": []
    }
  }
}
