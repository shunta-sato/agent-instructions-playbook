name: Validate agent instructions

on:
  pull_request:
  push:

jobs:
  agent-index:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate skills
        run: python scripts/validate_skills.py

      - name: Check metadata.requires manifests are current
        run: python scripts/update_skill_requires.py --check

      - name: Check Claude Code skills mirror is in sync
        run: python scripts/sync_claude_skills.py --check

      - name: Check route lockfile is current
        run: python scripts/generate_route_lockfile.py --check

      - name: Validate skill trigger eval seeds
        run: python scripts/validate_skill_trigger_evals.py

      - name: Validate skill behavior eval seeds
        run: python scripts/validate_skill_behavior_evals.py

      - name: Validate model routing
        run: python scripts/validate_model_routing.py

      - name: Validate model routing eval seeds
        run: python scripts/validate_model_routing_evals.py

      - name: Check skill inventory
        run: python scripts/report_skill_inventory.py --check --format text

      - name: Check AGENTS.md index is up to date
        run: python scripts/generate_agent_index.py --check
