pattern:
  id: "neutral-minimal"
  label: "Neutral Minimal"
  summary: "No confusion. Readable. Minimal decoration."
  suitable_for: ["product-ui", "docs", "marketing-site"]
  tokens:
    dtcg_json: "tonemana/catalog/tokens/neutral-minimal.tokens.json"
    css_vars: "tonemana/catalog/tokens/neutral-minimal.tokens.css"
  visual_rules:
    spacing_unit_px: 8
    radius_px: 8
    elevation: "low"
    imagery: "minimal"
  writing_style:
    politeness: "polite"
    sentence: "short"
    punctuation:
      exclamation: "avoid"
      emoji: "avoid"
    do_dont:
      do: "Network is unstable. Check your connection and try again."
      dont: "Error! Try again!"
  preview:
    html: "tonemana/catalog/previews/index.html?pattern=neutral-minimal"
